<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOLICITUDES - Dashboard Interactivo v3.1</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* MISMOS ESTILOS v3.0 + BOTONES EXPORT */
    :root {
      --primary-dark: #111827; --primary-gradient: linear-gradient(90deg, #111827 0%, #1e293b 100%);
      --success: #10b981; --success-light: #dcfce7; --success-border: #bbf7d0;
      --danger: #ef4444; --danger-light: #fef2f2; --danger-border: #fecaca;
      --warning: #f59e0b; --warning-light: #fef3c7; --warning-border: #fde68a;
      --info: #3b82f6; --info-light: #eff6ff; --info-border: #bfdbfe;
      --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0; --gray-300: #cbd5e1;
      --gray-500: #64748b; --gray-600: #475569; --gray-700: #334155; --gray-900: #0f172a;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05); --shadow-md: 0 4px 12px 0 rgb(0 0 0 / 0.08);
      --shadow-lg: 0 10px 32px 0 rgb(0 0 0 / 0.06); --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(180deg, #eef2f7 0%, #f7f9fc 100%); color: var(--gray-900); line-height: 1.6; }
    .container { max-width: 1600px; margin: 0 auto; padding: 24px 18px 48px; }

    /* CONTROLS BAR MEJORADA */
    .controls {
      background: white; border-radius: 20px; padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow-lg);
      display: grid; grid-template-columns: 1fr auto 1fr auto; gap: 20px; align-items: center;
      position: sticky; top: 20px; z-index: 100; backdrop-filter: blur(20px);
    }

    @media (max-width: 1024px) { .controls { grid-template-columns: 1fr 1fr; gap: 16px; } }
    @media (max-width: 768px) { .controls { grid-template-columns: 1fr; gap: 16px; } }

    .search-box { position: relative; max-width: 400px; }
    .search-input { width: 100%; padding: 14px 20px 14px 48px; border: 2px solid var(--gray-200); border-radius: 16px; font-size: 15px; transition: var(--transition); background: var(--gray-50); }
    .search-input:focus { outline: none; border-color: var(--info); box-shadow: 0 0 0 4px rgb(59 130 246 / 0.1); background: white; }
    .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--gray-500); }

    .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .filter-btn { padding: 10px 20px; border: 2px solid var(--gray-200); background: white; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; transition: var(--transition); }
    .filter-btn.active, .filter-btn:hover { background: var(--info); color: white; border-color: var(--info); transform: translateY(-1px); }

    /* 🆕 BOTONES EXPORT */
    .export-group { display: flex; gap: 12px; }
    .export-btn {
      padding: 12px 20px; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer;
      border: none; transition: var(--transition); display: flex; align-items: center; gap: 8px;
      box-shadow: var(--shadow-sm);
    }

    .export-excel { background: #2eb67d; color: white; }
    .export-excel:hover { background: #27a768; transform: translateY(-2px); box-shadow: var(--shadow-md); }

    .export-pdf { background: linear-gradient(135deg, #ff6b6b, #ee5a52); color: white; }
    .export-pdf:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

    .stats { display: flex; gap: 24px; justify-content: flex-end; flex-wrap: wrap; }
    .stat-item { text-align: center; font-weight: 700; }
    .stat-number { font-size: 24px; font-weight: 800; display: block; }
    .stat-label { font-size: 13px; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Loading spinner */
    .loading { opacity: 0.6; pointer-events: none; position: relative; }
    .loading::after {
      content: ''; position: absolute; top: 50%; left: 50%; width: 24px; height: 24px;
      margin: -12px 0 0 -12px; border: 2px solid transparent; border-top: 2px solid currentColor;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Resto de estilos igual que v3.0 */
    .row-hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <!-- CONTROLES CON EXPORT -->
    <div class="controls">
      <div class="search-box">
        <svg class="search-icon" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
          <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Buscar equipos, empresas...">
      </div>

      <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="instalar">Instalar</button>
        <button class="filter-btn" data-filter="desinstalar">Desinstalar</button>
        <button class="filter-btn" data-filter="instalado">Instalado</button>
      </div>

      <div class="stats">
        <div class="stat-item">
          <span class="stat-number" id="totalRows">25</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" style="color: var(--success);" id="visibleRows">25</span>
          <span class="stat-label">Visibles</span>
        </div>
      </div>

      <div class="export-group">
        <button class="export-btn export-excel" id="exportExcel" title="📊 Exportar Excel">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
          Excel
        </button>
        <button class="export-btn export-pdf" id="exportPDF" title="📄 Exportar PDF">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          </svg>
          PDF
        </button>
      </div>
    </div>

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="header">
        <img src="hex_logo_blk.png" class="logo" alt="Hexagon" loading="lazy" />
        <div>
          <h1>📊 Solicitudes Dashboard v3.1</h1>
          <p>Interactivo • Filtros • Export Excel/PDF • Responsive</p>
        </div>
      </div>
    </div>

    <!-- TUS TABLAS CON DATA ATTRIBUTES -->
    <!-- Solicitud 1 -->
    <section class="solicitud" data-solicitud="1">
      <div class="solicitud-header">
        <h2>Solicitud #1 <span class="tag desinstalar">Prioridad</span></h2>
        <span class="badge">5 equipos</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Cant.</th><th>Nro Interno</th><th>Patente</th><th>Marca</th><th>Modelo</th>
              <th>Tipo</th><th>Empresa</th><th>CAS</th><th>FMS</th><th>OAS</th><th>Estado</th>
            </tr>
          </thead>
          <tbody>
            <tr data-search="TO1406 komatsu d475-8r tractor oruga codelco instalar" data-tags="instalar">
              <td>1</td><td><strong>TO1406</strong></td><td>—</td><td>Komatsu</td><td>D475-8R</td>
              <td>Tractor Oruga</td><td>Codelco</td><td><span class="tag instalar">Instalar</span></td>
              <td><span class="tag instalar">Instalar</span></td><td><span class="tag instalar">Instalar</span></td>
              <td>🚨 Sin KIT CAS</td>
            </tr>
            <!-- Agrega todas tus filas aquí con data-search y data-tags -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- Más secciones... -->
  </div>

  <script>
    // 🎯 DASHBOARD v3.1 ULTRA CON EXPORT
    class DashboardUltra {
      constructor() {
        this.rows = document.querySelectorAll('tbody tr');
        this.totalRows = this.rows.length;
        this.visibleRows = this.totalRows;
        this.currentFilter = 'all';
        this.init();
      }

      init() {
        this.bindEvents();
        this.updateStats();
      }

      bindEvents() {
        // Filtros y búsqueda (igual v3.0)
        document.getElementById('searchInput').addEventListener('input', (e) => {
          this.filterSearch(e.target.value.toLowerCase());
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', (e) => this.setFilter(e.target.dataset.filter));
        });

        // 🆕 EXPORT EXCEL
        document.getElementById('exportExcel').addEventListener('click', () => {
          this.exportExcel();
        });

        // 🆕 EXPORT PDF
        document.getElementById('exportPDF').addEventListener('click', () => {
          this.exportPDF();
        });
      }

      // 📊 EXPORT EXCEL (solo visibles)
      exportExcel() {
        const btn = document.getElementById('exportExcel');
        btn.classList.add('loading');
        
        const visibleRows = Array.from(this.rows).filter(row => !row.classList.contains('row-hidden'));
        const data = [['Cant.', 'Nro Interno', 'Patente', 'Marca', 'Modelo', 'Tipo', 'Empresa', 'CAS', 'FMS', 'OAS', 'Estado']];
        
        visibleRows.forEach(row => {
          const cells = Array.from(row.cells).map(cell => {
            const text = cell.textContent.trim();
            return text || '—';
          });
          data.push(cells);
        });

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(data);
        XLSX.utils.book_append_sheet(wb, ws, 'Solicitudes');
        XLSX.writeFile(wb, `Solicitudes_${new Date().toISOString().slice(0,10)}.xlsx`);
        
        btn.classList.remove('loading');
        this.showToast('✅ Excel exportado correctamente');
      }

      // 🗄️ EXPORT PDF (captura visual)
      async exportPDF() {
        const btn = document.getElementById('exportPDF');
        btn.classList.add('loading');
        
        const container = document.querySelector('.container');
        const canvas = await html2canvas(container, {
          scale: 2,
          useCORS: true,
          backgroundColor: '#f8fafc',
          logging: false
        });

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgData = canvas.toDataURL('image/png');
        const imgWidth = 210;
        const pageHeight = 295;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        let heightLeft = imgHeight;

        pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
        heightLeft -= pageHeight;

        while (heightLeft >= 0) {
          pdf.addPage();
          pdf.addImage(imgData, 'PNG', 0, -heightLeft, imgWidth, imgHeight);
          heightLeft -= pageHeight;
        }

        pdf.save(`Dashboard_Solicitudes_${new Date().toISOString().slice(0,10)}.pdf`);
        btn.classList.remove('loading');
        this.showToast('✅ PDF exportado correctamente');
      }

      showToast(message) {
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.style.cssText = `
          position: fixed; top: 20px; right: 20px; background: #10b981; color: white;
          padding: 16px 24px; border-radius: 12px; box-shadow: var(--shadow-lg);
          font-weight: 600; z-index: 10000; transform: translateX(400px);
          transition: transform 0.3s ease;
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.style.transform = 'translateX(0)', 100);
        setTimeout(() => {
          toast.style.transform = 'translateX(400px)';
          setTimeout(() => document.body.removeChild(toast), 300);
        }, 3000);
      }

      // Métodos de filtro (igual v3.0)
      setFilter(filter) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
        this.currentFilter = filter;
        this.filterTable();
      }

      filterSearch(query) {
        this.rows.forEach(row => {
          const searchable = (row.dataset.search || '').toLowerCase();
          const matchesSearch = query === '' || searchable.includes(query);
          const matchesFilter = this.matchesFilter(row);
          row.classList.toggle('row-hidden', !(matchesSearch && matchesFilter));
        });
        this.updateStats();
      }

      matchesFilter(row) {
        if (this.currentFilter === 'all') return true;
        const tags = row.dataset.tags || '';
        return tags.includes(this.currentFilter);
      }

      filterTable() {
        this.rows.forEach(row => {
          row.classList.toggle('row-hidden', !this.matchesFilter(row));
        });
        this.updateStats();
      }

      updateStats() {
        const visible = document.querySelectorAll('tbody tr:not(.row-hidden)').length;
        document.getElementById('totalRows').textContent = this.totalRows;
        document.getElementById('visibleRows').textContent = visible;
      }
    }

    // 🚀 Inicializar
    document.addEventListener('DOMContentLoaded', () => {
      new DashboardUltra();
    });
  </script>
</body>
</html>
