<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HxGN Solicitudes · Login</title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;

      font-family: "Segoe UI", Tahoma, sans-serif;

      background:
        linear-gradient(
          135deg,
          #0f172a 0%,
          #1e293b 100%
        );

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 24px;
    }

    .login-card {

      width: 100%;
      max-width: 420px;

      background:
        linear-gradient(
          180deg,
          #ffffff 0%,
          #f8fafc 100%
        );

      border-radius: 28px;

      padding: 42px;

      box-shadow:
        0 30px 80px rgba(0,0,0,0.35);

      border:
        1px solid rgba(255,255,255,0.15);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo img {
      width: 210px;
      max-width: 100%;
      object-fit: contain;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;

      font-size: 28px;
      font-weight: 850;

      color: #0f172a;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 34px;
      font-size: 14px;
    }

    .group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;

      font-size: 13px;
      font-weight: 700;

      color: #334155;
    }

    input {

      width: 100%;
      height: 48px;

      border:
        1px solid #dbe3ee;

      border-radius: 14px;

      padding: 0 14px;

      font-size: 14px;

      outline: none;

      background: white;
    }

    input:focus {
      border-color: #0f172a;
    }

    button {

      width: 100%;
      height: 50px;

      border: none;

      border-radius: 14px;

      background:
        linear-gradient(
          90deg,
          #0f172a 0%,
          #1e293b 100%
        );

      color: white;

      font-size: 15px;
      font-weight: 800;

      cursor: pointer;

      margin-top: 10px;
    }

    button:hover {
      opacity: 0.95;
    }

    .error {

      margin-top: 16px;

      background: #fee2e2;
      color: #991b1b;

      border-radius: 12px;

      padding: 12px;

      font-size: 13px;

      display: none;
    }

    .footer {
      margin-top: 28px;

      text-align: center;

      font-size: 12px;

      color: #94a3b8;
    }

  </style>
</head>
<body>

  <div class="login-card">

    <div class="logo">
      <img src="hex_logo_blk.png" alt="Hexagon" />
    </div>

    <h1>HxGN Solicitudes</h1>

    <div class="subtitle">
      Plataforma operacional de gestión y solicitudes
    </div>

    <form id="loginForm">

      <div class="group">
        <label>Usuario</label>

        <input
          type="text"
          id="username"
          autocomplete="username"
          required
        />
      </div>

      <div class="group">
        <label>Contraseña</label>

        <input
          type="password"
          id="password"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit">
        Iniciar sesión
      </button>

      <div id="errorBox" class="error"></div>

    </form>

    <div class="footer">
      HxGN · Plataforma operacional
    </div>

  </div>

  <script>

    const API_LOGIN =
      "https://r0x.cl/hxgn_solicitudes/login.php";

    const form =
      document.getElementById("loginForm");

    const errorBox =
      document.getElementById("errorBox");

    form.addEventListener("submit", async (e) => {

      e.preventDefault();

      errorBox.style.display = "none";

      const username =
        document.getElementById("username").value;

      const password =
        document.getElementById("password").value;

      try {

        const response = await fetch(API_LOGIN, {

          method: "POST",

          headers: {
            "Content-Type": "application/json"
          },

          credentials: "include",

          body: JSON.stringify({
            username,
            password
          })

        });

        const result = await response.json();

        if (!result.ok) {
          throw new Error(result.error || "Error login");
        }

        localStorage.setItem(
          "usuario",
          JSON.stringify(result.usuario)
        );

        window.location.href = "index.html";

      } catch (error) {

        errorBox.style.display = "block";

        errorBox.textContent =
          error.message;
      }

    });

  </script>

</body>
</html>
