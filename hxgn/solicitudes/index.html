<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HxGN Solicitudes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <img src="hex_logo_blk.png" alt="Hexagon" />
      <div>
        <h1>Solicitudes</h1>
        <p>Dashboard operacional dinámico desde API</p>
      </div>
    </div>

    <div class="api-status">
      <span id="estadoApiDot" class="dot"></span>
      <span id="estadoApi">Conectando API...</span>
    </div>
  </header>

  <main class="container">
    <section class="summary">
      <div class="card">
        <h3>Solicitudes</h3>
        <p id="totalSolicitudes">0</p>
      </div>

      <div class="card">
        <h3>Equipos involucrados</h3>
        <p id="totalEquipos">0</p>
      </div>

      <div class="card">
        <h3>Promedio avance</h3>
        <p id="avanceGlobal">0%</p>
      </div>
    </section>

    <section>
      <h2 class="section-title">Listado de solicitudes</h2>
      <div id="solicitudesContainer" class="grid"></div>
    </section>
  </main>

  <div id="modalDetalle" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitulo">Detalle solicitud</h2>
        <button id="cerrarModal" class="btn-cerrar">Cerrar</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
